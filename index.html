<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOW DO TERCEIRAO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #2d00f7;
            --verde: #bcff00;
            --rosa: #ff00ff;
            --amarelo: #ffe600;
            --preto: #000;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--azul);
            background-image: radial-gradient(var(--rosa) 2px, transparent 2px);
            background-size: 40px 40px;
            font-family: 'Bungee', cursive;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--verde);
            border: 8px solid var(--preto);
            box-shadow: 16px 16px 0 var(--rosa);
            color: var(--preto);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card-dark {
            background: var(--preto);
            border: 8px solid var(--amarelo);
            box-shadow: 16px 16px 0 var(--verde);
            color: white;
            padding: 30px;
            width: 100%;
            max-width: 600px;
        }

        .title-text {
            font-size: 3rem;
            line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 4px 4px 0 var(--rosa), 8px 8px 0 var(--preto);
            margin-bottom: 10px;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            border: 6px solid var(--preto);
            box-shadow: 8px 8px 0 var(--preto);
            font-family: 'Bungee', cursive;
            font-size: 1.2rem;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            text-align: left;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translate(8px, 8px);
            box-shadow: 0 0 0 var(--preto);
        }

        .btn-pink { background: var(--rosa); color: white; text-align: center; }
        .btn-blue { background: var(--azul); color: white; }
        .btn-yellow { background: var(--amarelo); color: var(--preto); text-align: center; }
        .btn-white { background: white; color: var(--preto); }

        .input-retro {
            width: 100%;
            border: 6px solid var(--preto);
            background: white;
            font-family: 'Bungee', cursive;
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            box-shadow: 8px 8px 0 var(--preto);
            outline: none;
            color: var(--preto);
        }

        .input-retro:focus {
            box-shadow: 8px 8px 0 var(--rosa);
        }

        .pf { font-family: 'Press Start 2P', cursive; font-size: 10px; line-height: 1.8; }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--preto);
            color: white;
            border: 4px solid white;
            margin-right: 15px;
            font-size: 1.5rem;
        }

        .hidden { display: none !important; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 6px solid var(--preto);
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1 class="title-text">SHOW DO<br>TERCEIRAO</h1>
    <p class="pf text-white mb-8 bg-black p-2 border-4 border-white">MODO ONLINE - CONECTADO</p>

    <div id="tela-login" class="card">
        <h2 class="text-3xl mb-6 text-center">IDENTIFIQUE-SE</h2>
        
        <label class="pf mb-2 block">NOME DO RESPONSAVEL</label>
        <input id="input-pai" class="input-retro" type="text" placeholder="DIGITE AQUI...">
        
        <label class="pf mb-2 block">NOME DO ALUNO</label>
        <input id="input-filho" class="input-retro" type="text" placeholder="DIGITE AQUI...">
        
        <button class="btn btn-pink mt-4" onclick="iniciarJogo()">COMECAR JOGO</button>
    </div>

    <div id="tela-jogo" class="card hidden">
        <div class="status-bar">
            <span class="pf" id="contador-questoes">QUESTAO 0/0</span>
            <span class="pf" id="contador-acertos" style="color: var(--azul);">ACERTOS: 0</span>
        </div>
        
        <h2 class="text-2xl mb-8 leading-relaxed" id="texto-enunciado">CARREGANDO PERGUNTA...</h2>
        
        <div id="container-alternativas">
            </div>
    </div>

    <div id="tela-resultado" class="card-dark hidden text-center">
        <h2 class="text-4xl mb-4" style="color: var(--amarelo);">FIM DE JOGO</h2>
        <p class="pf mb-6">PONTUACAO FINAL</p>
        
        <p class="text-6xl mb-2" id="texto-pontuacao" style="color: var(--rosa);">0/0</p>
        <p class="pf mb-8" style="color: var(--verde);">ACERTOS</p>
        
        <button class="btn btn-yellow" onclick="recarregarJogo()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        
        let questoes = [];
        let indiceAtual = 0;
        let acertos = 0;
        
        let nomePai = '';
        let nomeFilho = '';

        // Inicia o jogo pegando os dados e as perguntas da API
        async function iniciarJogo() {
            nomePai = document.getElementById('input-pai').value.trim();
            nomeFilho = document.getElementById('input-filho').value.trim();

            if (!nomePai || !nomeFilho) {
                alert('PREENCHA OS DOIS NOMES PARA CONTINUAR!');
                return;
            }

            try {
                const resposta = await fetch(`${API_URL}/questoes`);
                const dados = await resposta.json();
                
                if (dados.length === 0) {
                    alert('NENHUMA QUESTAO CADASTRADA NO BANCO!');
                    return;
                }

                questoes = dados;
                indiceAtual = 0;
                acertos = 0;

                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('tela-jogo').classList.remove('hidden');
                
                mostrarQuestao();
            } catch (erro) {
                alert('ERRO AO CONECTAR COM A API. O SERVIDOR ESTA RODANDO?');
                console.error(erro);
            }
        }

        // Mostra a pergunta atual na tela
        function mostrarQuestao() {
            const questao = questoes[indiceAtual];
            
            document.getElementById('contador-questoes').innerText = `QUESTAO ${indiceAtual + 1}/${questoes.length}`;
            document.getElementById('contador-acertos').innerText = `ACERTOS: ${acertos}`;
            document.getElementById('texto-enunciado').innerText = questao.enunciado;

            const container = document.getElementById('container-alternativas');
            container.innerHTML = '';

            const alternativas = [
                { letra: 'A', texto: questao.alternativa_a, cor: 'var(--rosa)' },
                { letra: 'B', texto: questao.alternativa_b, cor: 'var(--azul)' },
                { letra: 'C', texto: questao.alternativa_c, cor: 'var(--verde)' },
                { letra: 'D', texto: questao.alternativa_d, cor: 'var(--amarelo)' }
            ];

            alternativas.forEach(alt => {
                const botao = document.createElement('button');
                botao.className = 'btn btn-white flex items-center';
                
                // Ajuste de cor do texto se o fundo for amarelo ou verde para dar contraste com a borda branca
                const corTextoBadge = (alt.letra === 'C' || alt.letra === 'D') ? 'var(--preto)' : 'white';

                botao.innerHTML = `<span class="badge" style="background: ${alt.cor}; color: ${corTextoBadge}; border-color: var(--preto);">${alt.letra}</span> ${alt.texto}`;
                botao.onclick = () => verificarResposta(alt.letra);
                
                container.appendChild(botao);
            });
        }

        // Verifica a resposta e passa para a próxima ou finaliza
        function verificarResposta(letraSelecionada) {
            const questao = questoes[indiceAtual];

            if (letraSelecionada === questao.resposta_correta) {
                acertos++;
            }

            indiceAtual++;

            if (indiceAtual < questoes.length) {
                mostrarQuestao();
            } else {
                finalizarJogo();
            }
        }

        // Mostra a tela final e envia o resultado para o banco
        async function finalizarJogo() {
            document.getElementById('tela-jogo').classList.add('hidden');
            document.getElementById('tela-resultado').classList.remove('hidden');
            
            document.getElementById('texto-pontuacao').innerText = `${acertos}/${questoes.length}`;

            // Salva o resultado no banco de dados
            const dadosResultado = {
                nome_pai: nomePai,
                nome_filho: nomeFilho,
                acertos: acertos,
                total_questoes: questoes.length,
                formulario_id: questoes[0].formulario_id // Usa o ID do formulário da primeira questão
            };

            try {
                await fetch(`${API_URL}/resultados`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dadosResultado)
                });
            } catch (erro) {
                console.error("ERRO AO SALVAR RESULTADO:", erro);
            }
        }

        function recarregarJogo() {
            window.location.reload();
        }
    </script>
</body>
</html>
